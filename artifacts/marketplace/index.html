    <!-- ── Icons ────────────────────────────────────────────────────────── -->

    <link rel="icon"             type="image/png" sizes="48x48" href="/favicon-48x48.png" />

    <!-- ── Resource Hints ────────────────────────────────────────────────
         preconnect: open DNS + TCP + TLS early so image fetches are instant.
         dns-prefetch: lighter fallback for older browsers (DNS only).
         Pexels    → hero image and category photos.
         Unsplash  → category photos.
         Cloudinary → seller-uploaded product images (most product cards).
         Google Fonts → Cairo Arabic font loaded via @import in index.css.
         ──────────────────────────────────────────────────────────────── -->
    <!-- Cloudflare Turnstile — preconnect cuts script load latency -->
    <link rel="preconnect"   href="https://challenges.cloudflare.com" crossorigin />
    <link rel="dns-prefetch" href="https://challenges.cloudflare.com" />
    <link rel="preconnect"   href="https://fonts.googleapis.com" />
    <link rel="preconnect"   href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect"   href="https://images.pexels.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.pexels.com" />
    <link rel="preconnect"   href="https://images.unsplash.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect"   href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://syano.online" />

    <!-- ── Self-hosted Inter — eliminates Google Fonts round-trip ──────────
         Single variable-font WOFF2 covers all weights 100-900 (Latin subset).
         Served same-origin → SW caches it as stale-while-revalidate on first
         visit. crossorigin is required for <link rel="preload" as="font">.
         ──────────────────────────────────────────────────────────────── -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/inter-latin.woff2"
      crossorigin
    />

    <!-- LCP hero image preload removed: the V7 HeroSection uses a CSS grid
         background (no static photo), so there is no fixed LCP image to preload. -->

    <!-- Google Fonts removed — Inter is now self-hosted at /fonts/inter-latin.woff2.
         @font-face declaration lives in index.css (processed by Vite/Tailwind). -->

    <!-- ── Structured Data (JSON-LD) ────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://syano.online/#organization",
          "name": "Syano",
          "alternateName": "سيانو",
          "url": "https://syano.online",
          "logo": {
            "@type": "ImageObject",
            "@id": "https://syano.online/#logo",
            "url": "https://syano.online/syano-logo.png",
            "contentUrl": "https://syano.online/syano-logo.png",
            "width": 512,
            "height": 512,
            "caption": "Syano — Syria's First Online Marketplace"
          },
          "image": { "@id": "https://syano.online/#logo" },
          "description": "Syria's first comprehensive online marketplace, connecting buyers and trusted sellers across Aleppo and Syria.",
          "foundingLocation": {
            "@type": "Place",
            "name": "Aleppo, Syria"
          },
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Aleppo",
            "addressCountry": "SY"
          },
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "@id": "https://syano.online/#website",
          "url": "https://syano.online",
          "name": "Syano",
          "alternateName": "سيانو",
          "description": "Syria's First Online Marketplace",
          "publisher": { "@id": "https://syano.online/#organization" },
          "inLanguage": ["en", "ar"],
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://syano.online/products?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Inline prefetch: fire the 3 critical homepage API requests BEFORE any
      JavaScript loads. By the time React mounts, the responses are either
      already resolved (zero loading state) or still in-flight but ahead of
      JS parse time. The results are seeded into React Query cache in App.tsx.
      Errors are swallowed — failed prefetch simply falls back to normal fetch.
    -->
    <script>
    (function(){
      var p=window.__prefetch={};
      function r(u){return fetch(u,{credentials:'same-origin'}).then(function(x){return x.ok?x.json():null;}).catch(function(){return null;});}
      p.settings=r('/api/settings');
      p.products=r('/api/products');
      p.bestSellers=r('/api/products/best-sellers?limit=4');
    })();
    </script>
    <!-- Google Identity Services — loaded async so it never blocks render -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
